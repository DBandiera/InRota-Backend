services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inrota
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - inrota_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inrota"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  inrota_postgres:
